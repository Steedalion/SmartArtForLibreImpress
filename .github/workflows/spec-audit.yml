name: Spec Audit

on:
  schedule:
    - cron: '3 22 * * *'   # 12:03 AM SAST (UTC+2) every night
  workflow_dispatch:         # allow manual trigger from the Actions tab

jobs:
  audit:
    runs-on: ubuntu-latest
    permissions:
      contents: write        # needed to push the report back to the repo

    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install anthropic

      - name: Run spec audit
        run: python .github/scripts/spec_audit.py
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Commit report
        run: |
          git config user.name  "spec-audit[bot]"
          git config user.email "spec-audit[bot]@users.noreply.github.com"
          git add spec-audit/
          git diff --cached --quiet || git commit -m "chore: spec audit report $(date -u +%Y-%m-%d)"
          git push
