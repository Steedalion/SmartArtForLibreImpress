name: Build and Validate Extension

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        run: mvn clean package

      - name: Validate OXT structure
        run: |
          set -e
          OXT=target/SmartArt.oxt
          test -f "$OXT" || { echo "::error::$OXT was not produced"; exit 1; }
          echo "Checking required files inside $OXT ..."
          for f in META-INF/manifest.xml description.xml Addons.xcu ProtocolHandler.xcu uno/SmartArtImpl.xml uno/smartart.jar; do
            if unzip -l "$OXT" | grep -q " $f$"; then
              echo "  OK   $f"
            else
              echo "::error::missing $f in OXT"; exit 1
            fi
          done
          echo "Checking component descriptor namespace ..."
          unzip -p "$OXT" uno/SmartArtImpl.xml | grep -q 'http://openoffice.org/2010/uno-components' \
            || { echo "::error::SmartArtImpl.xml must use the uno-components namespace"; exit 1; }
          echo "Checking description.xml identifier uses value attribute ..."
          unzip -p "$OXT" description.xml | grep -q '<identifier value="org.libreimpress.smartart"' \
            || { echo "::error::description.xml identifier must use value attribute"; exit 1; }
          echo "Structure valid."

      - name: Install LibreOffice
        run: |
          sudo apt-get update
          sudo apt-get install -y libreoffice libreoffice-java-common default-jre python3-uno xvfb

      - name: Verify registration and dispatch (headless UNO)
        run: xvfb-run -a bash uno-tests/run.sh --install target/SmartArt.oxt uno-tests/probes/registration_probe.py

      - name: Verify rendering API (headless UNO)
        run: xvfb-run -a bash uno-tests/run.sh uno-tests/probes/render_probe.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: SmartArt-extension
          path: target/SmartArt.oxt
